version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: minirag
      POSTGRES_USER: minirag
      POSTGRES_PASSWORD: minirag123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      # 5433 на хосте, чтобы не конфликтовать с локальным host-Postgres на :5432.
      # Внутри docker-сети БД по-прежнему на postgres:5432 (api ходит туда).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minirag -d minirag"]
      interval: 10s
      timeout: 5s
      retries: 5

  llama-server:
    build:
      context: ./docker/llama
      dockerfile: Dockerfile
    environment:
      MODEL_PATH: /models/${MODEL_FILE:-llama-3-8b-instruct.gguf}
      HOST: 0.0.0.0
      PORT: 8080
      N_GPU_LAYERS: 0
      N_CTX: 8192
      # N_PARALLEL=1: весь контекст идёт на один запрос (4096/4=1024 было мало —
      # линейный /query с 5 чанками = ~1295 токенов не влезал и падал в заглушку).
      N_PARALLEL: 1
    ports:
      - "8080:8080"
    volumes:
      - ./data/models:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://minirag:minirag123@postgres:5432/minirag
      LLAMA_SERVER_URL: http://llama-server:8080
      REDIS_URL: redis://redis:6379
      SYSTEM_PROMPT_FILE: /app/prompts/mini-rag-system-prompt.txt
      VECTOR_STORE_TYPE: pgvector
      # MiniLM-L6-v2 на русском даёт невысокие косинусные скоры → снижаем порог
      SIMILARITY_THRESHOLD: "0.3"
      # Провайдер LLM для агентного графа: llama | anthropic | openai
      LLM_BACKEND: ${LLM_BACKEND:-llama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8000:8000"
    volumes:
      - ./prompts:/app/prompts:ro
      - ./data:/app/data
      - ./eval:/app/eval
    depends_on:
      postgres:
        condition: service_healthy
      llama-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: minirag-network 